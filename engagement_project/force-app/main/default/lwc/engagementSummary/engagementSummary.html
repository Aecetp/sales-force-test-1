<template>
    <lightning-card title="Engagement Insights" icon-name="standard:service_report">
        <div class="slds-p-around_medium">
            <div class="slds-grid slds-wrap">
                <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">
                    <p class="slds-text-title_caps">Related Opp Amount</p>
                    <p class="slds-text-heading_small">
                        <lightning-formatted-number 
                            value={opportunityAmount} 
                            format-style="currency" 
                            currency-code="USD">
                        </lightning-formatted-number>
                    </p>
                </div>

                <div class="slds-col slds-size_1-of-2">
                    <p class="slds-text-title_caps">Completed Tasks</p>
                    <p class="slds-text-heading_medium slds-text-color_success">{completedTasks}</p>
                </div>
                <div class="slds-col slds-size_1-of-2">
                    <p class="slds-text-title_caps">Upcoming Events</p>
                    <p class="slds-text-heading_medium slds-text-color_weak">{upcomingEvents}</p>
                </div>
            </div>

            <div class="slds-m-top_medium">
                <lightning-button 
                    variant="brand" 
                    label="Quick Follow-Up Call" 
                    icon-name="utility:call"
                    onclick={handleQuickFollowUp}>
                </lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
